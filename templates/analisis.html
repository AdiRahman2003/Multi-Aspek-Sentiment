{% extends "base.html" %} {% block content %}
<div class="dashboard-container">
  <section class="analysis-section">
    <!-- Form Input -->
    <div class="form-card">
      <div class="form-header">
        <h2>Analisis Komentar Tunggal</h2>
        <p class="form-subtitle">
          Masukkan komentar untuk dianalisis sentimen dan aspeknya
        </p>
      </div>

      <div class="form-body">
        <form id="analysisForm">
          <div class="form-group">
            <label for="komentarInput" class="form-label">Komentar:</label>
            <textarea
              id="komentarInput"
              class="form-textarea"
              placeholder="Masukkan komentar yang ingin dianalisis..."
              rows="5"
              required
            ></textarea>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn-primary">
              <i class="fas fa-play"></i> Analisis
            </button>
            <button type="reset" class="btn-secondary">
              <i class="fas fa-redo"></i> Reset
            </button>
          </div>
        </form>

        <!-- Loading indicator -->
        <div
          id="loadingIndicator"
          class="loading-indicator"
          style="display: none"
        >
          <div class="spinner"></div>
          <p>Menganalisis komentar...</p>
        </div>
      </div>
    </div>

    <!-- Error Message -->
    <div id="errorContainer" class="alert-container" style="display: none">
      <div class="alert alert-danger">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorMessage"></span>
      </div>
    </div>

    <!-- Hasil Analisis -->
    <div id="resultsContainer" class="results-card" style="display: none">
      <div class="results-header">
        <h2>Hasil Analisis</h2>
      </div>

      <div class="comment-display">
        <p class="comment-label">Komentar yang Dianalisis:</p>
        <div class="comment-box">
          <p id="displayedComment"></p>
        </div>
      </div>

      <div class="table-container">
        <table class="analysis-table">
          <thead>
            <tr>
              <th>Aspek</th>
              <th>Opini</th>
              <th>Skor Lexicon</th>
              <th>Total Skor</th>
              <th>Sentimen</th>
              <th>Label Akhir</th>
            </tr>
          </thead>
          <tbody id="resultsTableBody">
            <!-- Populated by JavaScript -->
          </tbody>
        </table>
      </div>

      <div class="results-actions">
        <button type="button" class="btn-secondary" onclick="resetForm()">
          <i class="fas fa-arrow-left"></i> Kembali
        </button>
      </div>
    </div>
  </section>
</div>

<style>
  .analysis-section {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .form-card,
  .results-card {
    background: white;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
    overflow: hidden;
  }

  .form-header,
  .results-header {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
    padding: 20px;
  }

  .form-header h2,
  .results-header h2 {
    margin: 0 0 5px 0;
    font-size: 1.5rem;
  }

  .form-subtitle {
    margin: 0;
    opacity: 0.9;
    font-size: 0.95rem;
  }

  .form-body {
    padding: 30px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #333;
    font-size: 0.95rem;
  }

  .form-textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 8px;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    font-size: 0.95rem;
    resize: vertical;
    transition: border-color 0.3s;
  }

  .form-textarea:focus {
    outline: none;
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  .form-actions {
    display: flex;
    gap: 10px;
    justify-content: flex-start;
  }

  .btn-primary,
  .btn-secondary {
    padding: 10px 20px;
    border: none;
    border-radius: 8px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.95rem;
  }

  .btn-primary {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
  }

  .btn-primary:active {
    transform: translateY(0);
  }

  .btn-secondary {
    background: #f0f0f0;
    color: #333;
  }

  .btn-secondary:hover {
    background: #e0e0e0;
  }

  .loading-indicator {
    text-align: center;
    padding: 40px;
  }

  .spinner {
    border: 4px solid #f0f0f0;
    border-top: 4px solid #667eea;
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
    margin: 0 auto 15px;
  }

  @keyframes spin {
    0% {
      transform: rotate(0deg);
    }
    100% {
      transform: rotate(360deg);
    }
  }

  .alert-container {
    margin-bottom: 20px;
  }

  .alert {
    padding: 15px 20px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-weight: 500;
  }

  .alert-danger {
    background: #fee;
    color: #c33;
    border-left: 4px solid #c33;
  }

  .comment-display {
    padding: 20px;
    background: #f9f9f9;
    border-radius: 8px;
    margin-bottom: 20px;
  }

  .comment-label {
    margin: 0 0 10px 0;
    font-weight: 600;
    color: #666;
    font-size: 0.9rem;
    text-transform: uppercase;
  }

  .comment-box {
    background: white;
    border: 1px solid #e0e0e0;
    border-radius: 6px;
    padding: 15px;
    line-height: 1.6;
    color: #333;
  }

  .comment-box p {
    margin: 0;
    word-wrap: break-word;
  }

  .results-card {
    padding: 20px;
  }

  .results-header {
    margin: -20px -20px 20px -20px;
    padding: 20px;
  }

  .table-container {
    overflow-x: auto;
    margin-bottom: 20px;
  }

  .analysis-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.9rem;
  }

  .analysis-table thead {
    background: #f5f5f5;
  }

  .analysis-table th {
    padding: 12px;
    text-align: left;
    font-weight: 600;
    color: #333;
    border-bottom: 2px solid #e0e0e0;
  }

  .analysis-table td {
    padding: 12px;
    border-bottom: 1px solid #e0e0e0;
  }

  .analysis-table tbody tr:hover {
    background: #fafafa;
  }

  .badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.85rem;
    font-weight: 600;
  }

  .badge-positive {
    background: #d4edda;
    color: #155724;
  }

  .badge-negative {
    background: #f8d7da;
    color: #721c24;
  }

  .badge-neutral {
    background: #e2e3e5;
    color: #383d41;
  }

  .results-actions {
    display: flex;
    justify-content: center;
    padding-top: 20px;
    border-top: 1px solid #e0e0e0;
  }

  @media (max-width: 768px) {
    .form-body {
      padding: 15px;
    }

    .form-actions {
      flex-direction: column;
    }

    .btn-primary,
    .btn-secondary {
      width: 100%;
      justify-content: center;
    }

    .analysis-table {
      font-size: 0.8rem;
    }

    .analysis-table th,
    .analysis-table td {
      padding: 8px;
    }
  }
</style>

<script>
  // Form submission handler
  document
    .getElementById("analysisForm")
    .addEventListener("submit", async function (e) {
      e.preventDefault();

      const komentar = document.getElementById("komentarInput").value.trim();

      if (!komentar) {
        showError("Komentar tidak boleh kosong");
        return;
      }

      // Show loading
      document.getElementById("loadingIndicator").style.display = "block";
      document.getElementById("errorContainer").style.display = "none";
      document.getElementById("resultsContainer").style.display = "none";

      try {
        const response = await fetch("/api/analisis", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({ komentar: komentar }),
        });

        const data = await response.json();

        document.getElementById("loadingIndicator").style.display = "none";

        if (!response.ok || !data.success) {
          showError(data.error || "Terjadi kesalahan saat analisis");
          return;
        }

        // Display results
        displayResults(data.komentar, data.hasil_analisis);
      } catch (error) {
        document.getElementById("loadingIndicator").style.display = "none";
        showError("Terjadi kesalahan: " + error.message);
      }
    });

  function showError(message) {
    document.getElementById("errorMessage").textContent = message;
    document.getElementById("errorContainer").style.display = "block";
  }

  function displayResults(komentar, hasil_analisis) {
    // Display commented text
    document.getElementById("displayedComment").textContent = komentar;

    // Display results table
    const tbody = document.getElementById("resultsTableBody");
    tbody.innerHTML = "";

    hasil_analisis.forEach((result) => {
      const sentimen_badge = getSentimentBadge(result.sentimen);
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><strong>${escapeHtml(result.aspek)}</strong></td>
        <td>${escapeHtml(result.opini)}</td>
        <td>${escapeHtml(result.skor_lexicon)}</td>
        <td><strong>${result.total_skor}</strong></td>
        <td>${sentimen_badge}</td>
        <td><span class="badge-label">${escapeHtml(result.label_akhir)}</span></td>
      `;
      tbody.appendChild(tr);
    });

    // Show results container
    document.getElementById("resultsContainer").style.display = "block";

    // Scroll to results
    setTimeout(() => {
      document
        .getElementById("resultsContainer")
        .scrollIntoView({ behavior: "smooth" });
    }, 100);
  }

  function getSentimentBadge(sentimen) {
    let badgeClass = "badge-neutral";
    if (sentimen === "Positif") {
      badgeClass = "badge-positive";
    } else if (sentimen === "Negatif") {
      badgeClass = "badge-negative";
    }
    return `<span class="badge ${badgeClass}">${escapeHtml(sentimen)}</span>`;
  }

  function escapeHtml(text) {
    const map = {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;",
      "'": "&#039;",
    };
    return text.replace(/[&<>"']/g, (m) => map[m]);
  }

  function resetForm() {
    document.getElementById("analysisForm").reset();
    document.getElementById("errorContainer").style.display = "none";
    document.getElementById("resultsContainer").style.display = "none";
    document.getElementById("komentarInput").focus();
  }
</script>
{% endblock %}
